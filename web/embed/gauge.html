<!doctype html><html lang="nb"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Skybarometeret — måler</title><style>html,body{margin:0;background:#0e1217;color:#eef2f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}.embed{margin:0;padding:12px;text-align:center}.embed svg{width:100%;max-width:360px;height:auto}figcaption{font-size:12px;color:#a3b6c6;margin-top:8px;line-height:1.4}figcaption a{color:#5cb3ff}</style></head><body><figure class="embed"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 210" role="img" aria-label="Måler: 99,2 % av skannet norsk offentlig sektor på USA-kontrollert sky"><path d="M 20 170 A 150 150 0 0 1 320 170" fill="none" stroke="#384654" stroke-width="26" stroke-linecap="round"/><path id="arc" d="M 20 170 A 150 150 0 0 1 320 170" fill="none" stroke="#ff6b6b" stroke-width="26" stroke-linecap="round" stroke-dasharray="467.5 471.2"/><text id="val" x="170" y="158" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="64" fill="#ff6b6b">99,2 %</text><text x="170" y="192" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#a3b6c6">på USA-kontrollert sky</text></svg><figcaption id="cap"></figcaption></figure><script>(function(){var p=new URLSearchParams(location.search);var L=Math.PI*150;var pct=parseFloat(p.get('pct')||'99.2');var date=p.get('date')||'2026-06-29';if(!/^\d{4}-\d{2}-\d{2}$/.test(date))date='2026-06-29';if(p.get('pct')){var frac=Math.max(0,Math.min(1,pct/100));var arc=document.getElementById('arc');if(arc)arc.setAttribute('stroke-dasharray',(frac*L).toFixed(1)+' '+L.toFixed(1));var v=document.getElementById('val');if(v)v.textContent=pct.toFixed(1).replace('.',',')+' %';}document.getElementById('cap').innerHTML='Per '+date+' · Kilde: <a href="https://skytilsynet.no/" target="_blank" rel="noopener">Skytilsynet</a> (CC BY 4.0)';})();</script></body></html>
